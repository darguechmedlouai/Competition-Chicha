<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — Chicha Competition</title>
    <link rel="icon" type="image/png" href="chicha-celeste-black-edition-removebg-preview.ico">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .nav-back { 
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
        }
        .success-message {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .success-message i {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px var(--accent));
        }
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 255, 157, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .form-container {
            max-width: 850px;
            margin: 40px auto;
            padding: 60px;
            position: relative;
            z-index: 1;
        }
        
        .floating-element {
            position: absolute;
            z-index: -1;
            opacity: 0.5;
            filter: blur(2px);
        }
    </style>
</head>
<body>

    <img src="bg_inscription.jpg" class="page-bg" alt="Background">
    <div class="page-overlay"></div>

    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
        <p style="letter-spacing: 2px; font-weight: 700; color: var(--accent);">TRANSMISSION EN COURS...</p>
    </div>

    <div class="nav-back">
        <a href="index.html" class="btn btn-outline" style="padding: 12px 24px; backdrop-filter: blur(10px);"><i class="fas fa-arrow-left"></i> Retour</a>
    </div>

    <section style="padding-top: 100px; min-height: 100vh; display: flex; align-items: center;">
        <div class="container">
            
            <div class="glass form-card form-container animate-fade">
                <div style="text-align: center; margin-bottom: 50px;">
                    <img src="logo_premium.png" alt="Logo" style="width: 80px; margin-bottom: 20px;" class="3d-float">
                    <h2 style="font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px;">Inscription <span>Elite</span></h2>
                    <div class="underline" style="margin: 15px auto;"></div>
                </div>

                <form id="registration-form" action="https://usebasin.com/f/98a6b2e12044" method="POST">
                    <input type="hidden" name="_subject" value="Nouvelle inscription — Compétition Chicha">
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
                        <div class="form-group input-animated">
                            <label><i class="fas fa-user"></i> Nom *</label>
                            <input type="text" name="nom" placeholder="Ex: Mohsen" required>
                        </div>

                        <div class="form-group input-animated">
                            <label><i class="fas fa-user"></i> Prénom *</label>
                            <input type="text" name="prenom" placeholder="Ex: Ahmed" required>
                        </div>
                        <div class="form-group input-animated">
                            <label><i class="fas fa-envelope"></i> Email *</label>
                            <input type="email" name="email" placeholder="contact@domaine.com" required>
                        </div>
                        <div class="form-group input-animated">
                            <label><i class="fas fa-phone"></i> Téléphone *</label>
                            <input type="tel" name="telephone" placeholder="+216 00 000 000" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 20px;">
                        <div class="form-group input-animated">
                            <label><i class="fas fa-building"></i> Arrivé sur place *</label>
                            <select name="arrivee" required>
                                <option value="" disabled selected> Choix</option>
                                <option value="oui">Oui</option>
                                <option value="non">Non</option>
                            </select>
                        </div>
                        <div class="form-group input-animated">
                            <label><i class="fas fa-users"></i> Rôle *</label>
                            <select name="statut" required>
                                <option value="" disabled selected>Votre rôle</option>
                                <option value="participant">Participant</option>
                                <option value="jury">Jury</option>
                                <option value="spectateur">Spectateur VIP</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group input-animated" style="margin-top: 20px;">
                        <label><i class="fas fa-comment"></i> Remarque</label>
                        <textarea name="remarque" placeholder="Ajouter une remarque..." rows="3"></textarea>
                    </div>

                    <div class="form-group" style="margin-top: 30px; background: rgba(0, 255, 157, 0.05); padding: 25px; border-radius: 15px; border: 1px dashed var(--border);">
                        <div style="display: flex; align-items: center; gap: 20px;">
                            <i class="fas fa-file-pdf" style="font-size: 2.5rem; color: #ff4b2b;"></i>
                            <div>
                                <h4 style="margin-bottom: 5px;">Cahier des Charges</h4>
                                <p style="font-size: 0.85rem; color: var(--muted);">Obligatoire pour tous les participants.</p>
                            </div>
                            <a href="cahier_de_charge_chicha_pro.pdf" download class="btn btn-outline" style="margin-left: auto; padding: 10px 20px; font-size: 13px;">Télécharger</a>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 40px; font-size: 18px; text-transform: uppercase; letter-spacing: 2px;">
                        Finaliser l'Inscription <i class="fas fa-paper-plane" style="margin-left: 10px;"></i>
                    </button>
                </form>

                <div class="success-message" id="success-msg">
                    <i class="fas fa-check-circle"></i>
                    <h2 style="font-size: 2.5rem; margin-bottom: 15px;">Bienvenue dans l'Élite</h2>
                    <p style="color: var(--muted); font-size: 1.1rem;">Votre demande a été transmise avec succès. Préparez-vous pour l'événement.</p>
                    <a href="index.html" class="btn btn-primary" style="margin-top: 40px; padding: 15px 40px;">Retour au Lounge</a>
                </div>
            </div>

        </div>
    </section>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyCJs-j7lp2L4XYH-Ra-PMEPlddtOWEM--vUGy04BZjzsrJV-8z8RqPOmtndDpObMuSlA/exec";
        const EMAIL_APP_URL = "https://script.google.com/macros/s/AKfycbw71MOrr0YAR3zbMJxb2i-wqxbHz7tMls0miPcD0gDmIA-QXkFtqqKUU_tnnxeRAxYU/exec";
        const form = document.getElementById("registration-form");
        const loader = document.getElementById("loader");
        const successMsg = document.getElementById("success-msg");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            loader.style.display = "flex";

            const formData = new FormData(form);

            try {
                // Google Sheets
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: formData
                });
                
                // UseBasin
                await fetch(form.action, {
                    method: "POST",
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                // Email de confirmation (rôle-specific)
                await fetch(EMAIL_APP_URL, {
                    method: "POST",
                    body: formData
                });

                loader.style.display = "none";
                form.style.display = "none";
                successMsg.style.display = "block";
                
            } catch (err) {
                console.error("Erreur", err);
                form.submit();
            }
        });

        // 3D Tilt Effect - Désactivé sur mobile/tactile
        const card = document.querySelector('.form-card');
        const isTouchDevice = () => {
            return (
                (typeof window !== 'undefined' &&
                    ('ontouchstart' in window ||
                        navigator.maxTouchPoints > 0 ||
                        navigator.msMaxTouchPoints > 0))
            );
        };
        
        
        if (!isTouchDevice()) {
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
        }
    </script>
</body>
</html>
